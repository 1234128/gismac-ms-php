
<!DOCTYPE html>
<html lang="en">
<head><script src="js/config.js"></script>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=reset-password.html">
    <title>Redirecting...</title>
</head>
  <script>
    // Remove old API_URL declaration, use CONFIG.API_URL
    
    const urlParams = new URLSearchParams(window.location.search);
    const resetToken = urlParams.get('token');

    if (resetToken) {
        document.getElementById('requestStep').classList.add('hidden');
        document.getElementById('resetStep').classList.remove('hidden');
    }

    document.getElementById('requestForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        
        try {
            // Use CONFIG.API_URL
            const response = await fetch(`${CONFIG.API_URL}/auth/forgot-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            
            const data = await response.json();
            
            showMessage(data.success ? 
                'Reset link sent! Check your email.' : 
                (data.error?.message || 'Error sending reset link'),
                data.success ? 'success' : 'error'
            );
            
        } catch (error) {
            showMessage('Network error. Please try again.', 'error');
        }
    });

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        if (newPassword !== confirmPassword) {
            showMessage('Passwords do not match!', 'error');
            return;
        }
        
        try {
            // Use CONFIG.API_URL
            const response = await fetch(`${CONFIG.API_URL}/auth/reset-password/${resetToken}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: newPassword })
            });
            
            const data = await response.json();
            
            if (data.success) {
                showMessage('Password reset successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            } else {
                showMessage(data.error?.message || 'Error resetting password', 'error');
            }
            
        } catch (error) {
            showMessage('Network error. Please try again.', 'error');
        }
    });

    function showMessage(text, type) {
        const msgDiv = document.getElementById('message');
        msgDiv.textContent = text;
        msgDiv.className = `message ${type}`;
        msgDiv.style.display = 'block';
    }
</script>  
<body>
    <p>Redirecting to password reset page...</p>
</body>
</html>
